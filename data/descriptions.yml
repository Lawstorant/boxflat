  description: "Choose how the older wheel's RPM LEDs are controlled."
  default: "RPM"
  recommended: "RPM for game-driven RPM; Off to disable; On for a static display."

wheel-rpm-mode:
  description: "Use percentage of max RPM or exact RPM values for older wheel timing points."
  default: "Percent"
  recommended: "Percent is easier to transfer between cars; RPM is more precise."

presets-include-base:
  description: "Include base (wheelbase) settings in this preset."
  default: "On"
  recommended: "On for a complete car-specific setup."

presets-include-dash:
  description: "Include dash indicator settings in this preset."
  default: "On"
  recommended: "On if the preset should restore dash LED behavior."

presets-include-dash-color:
  description: "Include dash LED colors in this preset."
  default: "On"
  recommended: "On if the preset should restore dash color settings."

presets-include-wheel:
  description: "Include wheel settings in this preset."
  default: "On"
  recommended: "On for a complete car-specific setup."

presets-include-wheel-colors:
  description: "Include wheel LED colors in this preset."
  default: "Off"
  recommended: "Off by default; enable only if you want per-preset wheel colors."

presets-include-pedals:
  description: "Include pedal settings in this preset."
  default: "On"
  recommended: "On for a complete car-specific setup."

presets-include-hpattern:
  description: "Include H-pattern shifter settings in this preset."
  default: "Off"
  recommended: "Enable if the preset targets a car driven with an H-pattern shifter."

presets-include-sequential:
  description: "Include sequential shifter settings in this preset."
  default: "On"
  recommended: "Enable if the preset targets a car driven with a sequential shifter."

presets-include-handbrake:
  description: "Include handbrake settings in this preset."
  default: "On"
  recommended: "Enable if the preset targets a car that uses the handbrake."

presets-include-stalks:
  description: "Include multifunction stalk settings in this preset."
  default: "Off"
  recommended: "Enable if the preset targets a car driven with multifunction stalks."

main-set-ble-mode:
  description: "Enable Bluetooth on the wheel base for the mobile app."
  recommended: "Disable if you do not use the MOZA mobile app."

main-set-compat-mode:
  description: "Enable Forza Horizon 5 compatibility mode on the wheel base."
