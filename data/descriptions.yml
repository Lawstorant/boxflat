hpattern-blip-enabled:
  description: "Automatically blip the throttle on downshifts with an H-pattern shifter."
  default: "Off"
  recommended: "Enable for cars without auto-blip if you heel-and-toe manually."

hpattern-blip-level:
  description: "Throttle output level used for the auto blip."
  range: "0 – 100 %"
  default: "0 %"
  recommended: "Start around 50 % and adjust until downshifts are smooth."

hpattern-blip-duration:
  description: "How long the throttle blip lasts."
  range: "0 – 1000 ms"
  default: "0 ms"
  recommended: "100–300 ms is typical; shorter for fast gearboxes."

sequential-direction:
  description: "Reverse the shift direction of the sequential shifter."
  default: "Off"
  recommended: "Off for normal operation; enable only if upshift/downshift are swapped."

sequential-paddle-sync:
  description: "Make the sequential shifter use the same button inputs as the wheel paddle shifters."
  default: "Off"
  recommended: "Enable if you want the sequential module and paddles to share bindings."

sequential-brightness:
  description: "Brightness of the sequential shifter LEDs."
  range: "0 – 10"
  default: "10"
  recommended: "10 for daytime; lower in a dark room."


handbrake-direction:
  description: "Reverse the handbrake input direction."
  default: "Off"
  recommended: "Off for normal operation; enable only if the input is inverted."

handbrake-mode:
  description: "Choose whether the handbrake is read as an analog axis or a digital button."
  default: "Axis"
  recommended: "Axis for analog control; Button if your game only supports digital handbrake input."

handbrake-button-threshold:
  description: "Activation threshold when the handbrake is in Button mode."
  range: "0 – 100 %"
  default: "50 %"
