stalks-wipers-quick:
  description: "Emulate a single quick wipe when a wiper mode is activated."
  default: "Off"
  recommended: "Enable if your car requires a brief wipe input before the selected mode takes over."

stalks-ignition:
  description: "Use the rear wiper stalk input as an ignition/start button."
  default: "Off"
  recommended: "Enable for immersion if your wheel/stalk setup maps a rear wiper input to ignition."

