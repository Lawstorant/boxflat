base-limit:
  description: "Total rotation angle from lock to lock."
  range: "90 – 2700 °"
  default: "900 °"
  recommended: "Set via in-game steering ratio first; 540–900 ° is typical for road cars."

base-calibration:
  description: "Set the wheel center point. Turn the wheel to the desired center, then press Center."
  recommended: "Use only when the in-game wheel does not match your physical wheel."

main-set-work-mode:
  description: "Put the wheel base into standby mode."
  default: "Off"
  recommended: "Keep off during normal use."

base-ffb-disable:
  description: "Enable force feedback output. (The switch state is reversed internally: ON means FFB is active.)"
  default: "On"
  recommended: "Keep on unless debugging or using an E-Stop."

base-torque:
  description: "Maximum torque output delivered by the wheel base."
  range: "50 – 100 %"
  default: "100 %"
  recommended: "100 % for most users; lower only if the wheel feels too strong."

base-ffb-strength:
  description: "Overall strength of game force feedback."
  range: "0 – 100 %"
  default: "80 %"
  recommended: "Start at 80 % and adjust per game."

base-speed:
  description: "Maximum rotational speed of the wheel."
  range: "0 – 200 %"
  default: "100 %"
  recommended: "Leave at 100 % unless you need to limit wheel spin."

base-protection:
  description: "Enable hands-off protection to reduce unwanted wheel movement when you let go."
  default: "Off"
  recommended: "Enable for powerful bases if the wheel oscillates when released."

base-protection-mode:
  description: "Select the hands-off protection algorithm."
  default: "Mode 1"
  recommended: "Try Mode 1 first; switch to Mode 2 if oscillations persist."

base-natural-inertia:
  description: "Inertia applied by hands-off protection when you release the wheel."
  range: "100 – 4000"
  default: "1100"
  recommended: "1100 for KS/GS wheels; match the suggested mark for your wheel."

base-speed-damping:
  description: "Damping applied at high wheel speeds."
  range: "0 – 100 %"
  default: "0 %"
  recommended: "Leave at 0 % unless high-speed rotation feels unstable."

base-speed-damping-point:
  description: "Speed at which high-speed damping begins to apply."
  range: "0 – 400 kph"
  default: "120 kph"
  recommended: "120 kph is a safe starting point."

base-damper:
  description: "Damping effect generated by the wheel base."
  range: "0 – 100 %"
  default: "40 %"
  recommended: "Use sparingly; too much damping makes the wheel feel muddy."

base-friction:
  description: "Friction effect generated by the wheel base."
  range: "0 – 100 %"
  default: "25 %"
  recommended: "Low values add realism; high values can mask details."

base-inertia:
  description: "General simulated rotational inertia added to all wheel movement."
  range: "100 – 500"
  default: "250"
  recommended: "250 is a balanced starting point."

base-spring:
  description: "Spring effect pulling the wheel to center."
  range: "0 – 100 %"
  default: "0 %"
  recommended: "Games usually provide their own centering spring; set this low."

main-set-damper-gain:
  description: "Gain for game-generated damper effects."
  range: "0 – 100 %"
  default: "50 %"
  recommended: "50 %; reduce if effects feel exaggerated."

main-set-friction-gain:
  description: "Gain for game-generated friction effects."
  range: "0 – 100 %"
  default: "50 %"
  recommended: "50 %; increase for more tire scrub feel."

main-set-inertia-gain:
  description: "Gain for game-generated inertia effects."
  range: "0 – 100 %"
  default: "50 %"
  recommended: "50 %; adjust to taste."

main-set-spring-gain:
  description: "Gain for game-generated spring effects."
  range: "0 – 100 %"
  default: "100 %"
  recommended: "100 % if the game uses a centering spring; lower otherwise."

base-soft-limit-stiffness:
  description: "Stiffness of the soft limit at the rotation boundary."
  range: "1 – 10"
  default: "5"
  recommended: "6 provides a clear but not harsh limit."

base-soft-limit-strength:
  description: "Strength of the soft limit effect."
  default: "Middle"
  recommended: "Middle for most users; Soft for quieter operation."

base-soft-limit-retain:
  description: "Keep game FFB active when the soft limit is engaged."
  default: "Off"
  recommended: "Enable if you want to retain road feel at the limit."

main-set-led-status:
  description: "Enable the base status LED."
  default: "On"
  recommended: "On if your base has the LED."

base-temp-strategy:
  description: "Fan and thermal control strategy."
  default: "Conservative"
  recommended: "Conservative (50 °C target) for quieter operation; Radical (60 °C) for sustained performance."

base-music-enabled-set:
  description: "Play a startup sound when the base powers on."
  default: "On"
  recommended: "Off if you prefer a silent startup."

base-music-index-set:
  description: "Select the startup music track."
  range: "1 – 10"
  recommended: "Choose by ear; preview with the Play button."

base-music-volume-set:
  description: "Startup music volume."
  range: "0 – 100"
  default: "20"
  recommended: "20 or lower; the base speaker can be very loud above 20."

base-music-preview:
  description: "Play the selected startup music track now."
  recommended: "Use to preview the selected track and volume."

base-equalizer1:
  description: "FFB equalizer band at 10 Hz."
  range: "0 – 400 %"
  default: "100 %"
  recommended: "Start at 100 %; cut rumble by lowering this band."

base-equalizer2:
  description: "FFB equalizer band at 15 Hz."
  range: "0 – 400 %"
  default: "100 %"
  recommended: "Start at 100 %."

base-equalizer3:
  description: "FFB equalizer band at 25 Hz."
  range: "0 – 400 %"
  default: "100 %"
  recommended: "Start at 100 %."

base-equalizer4:
  description: "FFB equalizer band at 40 Hz."
  range: "0 – 400 %"
  default: "100 %"
  recommended: "Start at 100 %."

base-equalizer5:
  description: "FFB equalizer band at 60 Hz."
  range: "0 – 400 %"
  default: "100 %"
  recommended: "Start at 100 %."

base-equalizer6:
  description: "FFB equalizer band at 100 Hz."
  range: "0 – 400 %"
  default: "100 %"
  recommended: "Start at 100 %; raise slightly for more high-frequency detail."

base-road-sensitivity:
  description: "Global road texture and detail sensitivity."
  range: "0 – 10"
  default: "10"
  recommended: "5 is balanced; lower for smoother feel, higher for more detail."

main-set-interpolation:
  description: "Smooth FFB samples by interpolating between values."
  range: "0 – 10"
  default: "0"
  recommended: "0 for lowest latency; increase only if FFB feels grainy."

base-ffb-curve-x1:
  description: "Offset the first curve point to the left or right."
  range: "0 – 18"
  default: "0"
  recommended: "10 for a centered curve."

base-ffb-curve-y1:
  description: "FFB curve output at 20 % game FFB input."
  range: "0 – 100 %"
  default: "20 %"
  recommended: "20 % for a linear curve."

base-ffb-curve-y2:
  description: "FFB curve output at 40 % game FFB input."
  range: "0 – 100 %"
  default: "40 %"
  recommended: "40 % for a linear curve."

base-ffb-curve-y3:
  description: "FFB curve output at 60 % game FFB input."
  range: "0 – 100 %"
  default: "60 %"
  recommended: "60 % for a linear curve."

base-ffb-curve-y4:
  description: "FFB curve output at 80 % game FFB input."
  range: "0 – 100 %"
  default: "80 %"
  recommended: "80 % for a linear curve."

base-ffb-curve-y5:
  description: "FFB curve output at 100 % game FFB input."
  range: "0 – 100 %"
  default: "100 %"
  recommended: "100 % for a linear curve."

base-ffb-reverse:
  description: "Reverse the direction of force feedback."
  default: "Off"
  recommended: "Off; enable only if a specific game inverts FFB."
wheel-paddles-mode:
  description: "Choose how the clutch paddles behave."
  default: "Combined"
  recommended: "Split for independent clutch/bite-point control; Combined for a single analog clutch."

wheel-clutch-point:
  description: "Bite point for the split clutch paddles."
  range: "5 – 95 %"
  default: "50 %"
  recommended: "Adjust to match your car's clutch engagement point."

wheel-knob-mode:
  description: "Set the rotary encoder to behave as buttons or as a knob."
  default: "Buttons"
  recommended: "Buttons for most sims; Knob if the game supports encoder input."

wheel-stick-mode:
  description: "Set the left analog stick to behave as buttons or as a D-pad."
  default: "D-Pad"
  recommended: "D-Pad for menu navigation; Buttons for extra inputs."

wheel-idle-mode:
  description: "LED animation played when the wheel is idle."
  default: "Breathing"
  recommended: "Off to disable idle lighting; Breathing for a subtle effect."

wheel-idle-timeout:
  description: "Minutes of inactivity before idle lighting starts. 0 disables the timeout."
  range: "0 – 30 min"
  default: "10 min"
  recommended: "10 min, or 0 to keep idle lighting always off."

wheel-idle-speed:
  description: "Blink interval for the idle LED effect."
  range: "125 – 5000 ms"
  default: "2500 ms"
  recommended: "2500 ms for a gentle pulse."

wheel-key-combination:
  description: "Enable or disable wheel button combinations for quick settings changes."
  default: "All off"
  recommended: "Enable only the combinations you use frequently to avoid accidental triggers."

wheel-telemetry-mode:
  description: "Choose how the RPM LEDs are controlled."
  default: "Telemetry"
  recommended: "Telemetry for game-driven RPM; Static for a fixed color; Off to disable."

wheel-telemetry-idle-effect:
  description: "LED animation played on the RPM LEDs when telemetry shows idle."
  default: "Breathing"
  recommended: "Off to disable; Color cycle for a rainbow effect."

wheel-telemetry-idle-interval:
  description: "Blink interval for the telemetry idle LED effect."
  range: "125 – 5000 ms"
  default: "2500 ms"
  recommended: "2500 ms for a gentle effect."

wheel-rpm-brightness:
  description: "Brightness of the RPM LEDs."
  range: "0 – 100 %"
  default: "100 %"
  recommended: "100 % for daytime; lower at night."

wheel-buttons-idle-effect:
  description: "LED animation played on the RGB buttons when telemetry shows idle."
  default: "Constant"
  recommended: "Off to disable; Color cycle to match the RPM LEDs."

wheel-buttons-idle-interval:
  description: "Blink interval for the button idle LED effect."
  range: "125 – 5000 ms"
  default: "2500 ms"
  recommended: "2500 ms for a gentle effect."

wheel-buttons-brightness:
  description: "Brightness of the RGB buttons."
  range: "0 – 100 %"
  default: "100 %"
  recommended: "100 % for daytime; lower at night."

pedals-throttle-y1:
  description: "Throttle curve output at 20 % raw input."
  range: "0 – 100 %"
  default: "20 %"
  recommended: "20 % for a linear throttle curve."

pedals-throttle-y2:
