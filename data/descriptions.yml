stalks-turnsignal-compat:
  description: "Make turn signals toggle on/off with each press instead of being held."
  default: "Off"
  recommended: "Enable if your game expects a toggle input for turn signals."

stalks-turnsignal-compat-constant:
  description: "Hold the turn signal button for as long as the signal should stay active."
  default: "Off"
  recommended: "Enable if your game expects a held input for turn signals."

stalks-headlights-compat:
  description: "Cycle through headlight modes instead of using discrete buttons."
  default: "Off"
  recommended: "Enable for games that only support a single headlight toggle."

stalks-skip-positional:
  description: "Skip positional headlight states and use only on/off."
  default: "Off"
  recommended: "Enable for games that have only a simple headlight on/off control."

stalks-wipers-compat:
  description: "Cycle through wiper modes instead of using discrete buttons."
  default: "Off"
