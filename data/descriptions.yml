pedals-brake-angle-ratio:
  description: "Blend between angle sensor and load cell for brake input."
  range: "0 – 100 %"
  default: "50 %"
  recommended: "0 % = angle only; 100 % = load cell only. Set to 100 % if you have a load cell kit."

pedals-clutch-y1:
  description: "Clutch curve output at 20 % raw input."
  range: "0 – 100 %"
  default: "20 %"
